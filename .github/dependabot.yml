version: 2
updates:
  - package-ecosystem: "nuget"
    # Points to the directory containing your .sln or .csproj files
    directory: "/" 
    schedule:
      interval: "weekly"
    # Optional: Groups updates to reduce PR noise
    groups:
      dotnet-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 10
    labels:
      - "nuget"
      - "dependencies"
